<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食口袋名單</title>

    <!-- 瀏覽器網址列/工作列的主題色，跟網站主色一致 -->
    <meta name="theme-color" content="#e2492a" id="themeColorMeta">

    <!-- 在畫面渲染前，先套用使用者上次選擇的風格色調，避免畫面先閃一下預設色再切換 -->
    <script>
        (function(){
            try {
                var savedTheme = localStorage.getItem("foodAppTheme");
                if(savedTheme){
                    document.documentElement.setAttribute("data-theme", savedTheme);
                }
            } catch(e){ /* 無痕模式或瀏覽器封鎖 localStorage 時，安靜地忽略，改用預設風格 */ }
        })();
    </script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet 地圖套件（免費、不需要 API 金鑰） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="apiFunction.js" defer></script>

    <!-- 電腦瀏覽器 favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <!-- 舊瀏覽器支援 -->
    <link rel="shortcut icon" href="favicon.ico">

    <!-- iPhone / iPad 加入主畫面 -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-icon-192.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- ====================== 背景飄浮美食 emoji ====================== -->
    <div class="food-bg" aria-hidden="true">
        <span style="left:4%; font-size:75px; animation-duration:22s; animation-delay:-3s; --drift:24px; --rotate:14deg; --emoji-opacity:.24;">🍜</span>
        <span style="left:15%; font-size:56px; animation-duration:18s; animation-delay:-15s; --drift:-18px; --rotate:-10deg; --emoji-opacity:.26;">🍣</span>
        <span style="left:26%; font-size:70px; animation-duration:26s; animation-delay:-8s; --drift:16px; --rotate:8deg; --emoji-opacity:.22;">🍕</span>
        <span style="left:38%; font-size:65px; animation-duration:20s; animation-delay:-17s; --drift:-22px; --rotate:12deg; --emoji-opacity:.25;">🍔</span>
        <span style="left:50%; font-size:52px; animation-duration:16s; animation-delay:-6s; --drift:14px; --rotate:-8deg; --emoji-opacity:.28;">🍰</span>
        <span style="left:61%; font-size:70px; animation-duration:24s; animation-delay:-20s; --drift:-20px; --rotate:10deg; --emoji-opacity:.23;">🍩</span>
        <span style="left:72%; font-size:82px; animation-duration:19s; animation-delay:-11s; --drift:18px; --rotate:-14deg; --emoji-opacity:.26;">🍤</span>
        <span style="left:82%; font-size:58px; animation-duration:23s; animation-delay:-19s; --drift:-16px; --rotate:9deg; --emoji-opacity:.24;">🥐</span>
        <span style="left:91%; font-size:61px; animation-duration:17s; animation-delay:-4s; --drift:20px; --rotate:-11deg; --emoji-opacity:.27;">🍎</span>
        <span style="left:8%; font-size:65px; animation-duration:15s; animation-delay:-9s; --drift:-14px; --rotate:15deg; --emoji-opacity:.25;">🍇</span>
        <span style="left:45%; font-size:80px; animation-duration:21s; animation-delay:-2s; --drift:12px; --rotate:-9deg; --emoji-opacity:.24;">🍙</span>
        <span style="left:68%; font-size:53px; animation-duration:27s; animation-delay:-23s; --drift:-24px; --rotate:13deg; --emoji-opacity:.22;">🧋</span>
    </div>

    <div class="app">
        <header class="header">
            <div class="brand">
                <div class="logo">
                    <img src="logo.png" alt="logo">
                </div>
                <div>
                    <h1>美食口袋名單</h1>
                    <p>收藏你的美味回憶</p>
                </div>
            </div>
            <div class="count-box">
                <span id="foodCount">0</span>
                <small>間餐廳</small>
            </div>
        </header>

        <div class="search-area">
            <div class="search-box">
                <span>🔍</span>
                <input id="searchInp" type="text" placeholder="搜尋店名、類型、地址..." oninput="filterFood()">
            </div>
            <button id="favFilterBtn" class="fav-filter-btn" onclick="toggleFavFilter()">
                ⭐ 只看最愛
            </button>
            <button id="mapViewBtn" class="fav-filter-btn map-view-btn" onclick="openMapView()">
                🗺️ 地圖檢視
            </button>
        </div>

        <div id="regionFilterBar" class="region-filter-bar"></div>

        <div class="theme-picker-bar" role="group" aria-label="選擇風格色調">
            <span class="theme-picker-label">🎨 風格</span>
            <button class="theme-swatch" data-theme="sunset" title="夕陽楓紅" aria-label="夕陽楓紅" onclick="setTheme('sunset')"></button>
            <button class="theme-swatch" data-theme="ocean" title="海洋藍調" aria-label="海洋藍調" onclick="setTheme('ocean')"></button>
            <button class="theme-swatch" data-theme="forest" title="森林抹茶" aria-label="森林抹茶" onclick="setTheme('forest')"></button>
            <button class="theme-swatch" data-theme="berry" title="莓果粉紫" aria-label="莓果粉紫" onclick="setTheme('berry')"></button>
            <button class="theme-swatch" data-theme="charcoal" title="質感灰調" aria-label="質感灰調" onclick="setTheme('charcoal')"></button>
        </div>

        <section class="desktop-form card">
            <h2 id="formTitle">✨ 新增餐廳</h2>
            <form id="foodForm">
                <div class="input-group">
                    <label>店名 *</label>
                    <input id="name" type="text" placeholder="例如：大心拉麵">
                </div>
                <div class="input-group">
                    <label>類型</label>
                    <select id="type" required>
                        <option value="" disabled selected hidden>請選擇類型</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>評價</label>
                    <input id="rating" type="number" min="1" max="5" placeholder="1 - 5">
                </div>
                <div class="input-group">
                    <label>地址</label>
                    <input id="address" type="text" placeholder="輸入地址">
                </div>
                <div class="input-group">
                    <label>相關網頁連結</label>
                    <input id="link" type="url" placeholder="輸入網頁網址 (https://...)">
                </div>
                <div class="input-group">
                    <label>美味備註</label>
                    <textarea id="note" placeholder="推薦料理、心得..."></textarea>
                </div>
                <button class="primary-btn" id="submitBtn" type="button" onclick="submitFood()">收藏餐廳</button>
                <button class="cancel-edit-btn" id="cancelEditBtn" type="button" onclick="cancelEdit()" style="display:none;">取消編輯</button>
            </form>
        </section>

        <!-- ====================== Food List ======================= -->
        <main id="foodContainer" class="food-grid">
            <div class="loading">
                正在載入美食收藏...
            </div>
        </main>

        <!-- ====================== Mobile Add Button ======================= -->
        <button class="floating-btn" onclick="openAddModal()">
            ＋
        </button>
    </div>

    <!-- ====================== Mobile Modal ======================= -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"> 新增餐廳 </h2>
                <button onclick="closeModal()"> ✕ </button>
            </div>
            <div class="mobile-form">
                <div class="input-group">
                    <label> 店名 * </label>
                    <input id="m-name" type="text" placeholder="餐廳名稱">
                </div>
                <div class="input-group">
                    <label> 類型 </label>
                    <select id="m-type" required>
                        <option value="" disabled selected hidden>請選擇類型</option>
                    </select>
                </div>
                <div class="input-group">
                    <label> 評價 </label>
                    <input id="m-rating" type="number" min="1" max="5">
                </div>
                <div class="input-group">
                    <label> 地址 </label>
                    <input id="m-address" type="text">
                </div>
                <div class="input-group">
                    <label> 相關網頁連結 </label>
                    <input id="m-link" type="url" placeholder="https://...">
                </div>
                <div class="input-group">
                    <label> 備註 </label>
                    <textarea id="m-note"></textarea>
                </div>
                <button class="primary-btn" id="modalSubmitBtn" onclick="submitMobileFood()">
                    收藏
                </button>
                <button class="cancel-edit-btn" id="cancelEditBtnMobile" type="button" onclick="cancelEdit()" style="display:none;">
                    取消編輯
                </button>
            </div>
        </div>
    </div>

    <!-- ====================== 地圖檢視（全螢幕） ======================= -->
    <div id="mapView" class="map-view">
        <div class="map-view-header">
            <button class="map-back-btn" onclick="closeMapView()">← 返回列表</button>
            <div class="map-view-title">🗺️ 美食地圖 <span id="mapPinCount"></span></div>
        </div>
        <div id="mapCanvas" class="map-canvas"></div>
        <div id="mapLoading" class="map-loading">📍 正在定位美食座標...</div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
</body>
</html>
